<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmotext - Proximamente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0B1628;
            color: #FAFAF8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }
        p {
            font-size: 1.1rem;
            opacity: 0.7;
            max-width: 400px;
        }
        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #FF5733;
            border-radius: 50%;
            margin: 2rem auto 0;
        }
    </style>
</head>
<body>
    <div class="logo">Inmotext</div>
    <p>Algo grande esta llegando para agentes inmobiliarios en Espana.</p>
    <div class="dot"></div>
</body>
</html>
